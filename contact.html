<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAULT — Contact</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --red: #e8271e;
  --bg: #080808;
  --surface: #111;
  --border: rgba(255,255,255,0.08);
  --text: #f0ede8;
  --muted: #777;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* HEADER */
header {
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(10px);
}

.logo {
  font-family: 'Archivo Black', sans-serif;
  letter-spacing: 5px;
  font-size: 22px;
}

.logo span {
  color: var(--red);
}

a {
  color: var(--muted);
  text-decoration: none;
  transition: 0.2s;
}

a:hover {
  color: var(--red);
}

/* LAYOUT */
.container {
  max-width: 900px;
  margin: 70px auto;
  padding: 0 20px;
}

h1 {
  font-family: 'Archivo Black', sans-serif;
  font-size: 42px;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

p {
  color: var(--muted);
  margin-bottom: 40px;
  font-size: 15px;
}

/* FORM */
form {
  background: var(--surface);
  padding: 35px;
  border-radius: 20px;
  border: 1px solid var(--border);
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

label {
  display: block;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

input,
textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 22px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0d0d0d;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: 0.25s;
}

input:focus,
textarea:focus {
  border-color: var(--red);
  box-shadow: 0 0 0 4px rgba(232,39,30,0.12);
}

textarea {
  min-height: 160px;
  resize: vertical;
}

/* BUTTON */
button {
  background: var(--red);
  color: white;
  border: none;
  padding: 14px 30px;
  border-radius: 999px;
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  transition: 0.25s;
  box-shadow: 0 0 24px rgba(232,39,30,0.25);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 32px rgba(232,39,30,0.4);
}

/* STATUS NOTE */
.note {
  margin-top: 18px;
  font-size: 13px;
  color: var(--muted);
}

/* MOBILE */
@media (max-width: 700px) {
  header {
    padding: 18px 20px;
  }

  h1 {
    font-size: 32px;
  }

  form {
    padding: 24px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">V<span>A</span>ULT</div>
  <a href="index.html">← Back to Library</a>
</header>

<div class="container">
  <h1>Contact Us</h1>
  <p>
    Send feedback, report issues, or suggest new features for VAULT.
  </p>

  <form id="contactForm" onsubmit="sendMessage(event)">

    <label>Name</label>
    <input
      id="name"
      type="text"
      required
      placeholder="Your name"
    >

    <label>Email</label>
    <input
      id="email"
      type="email"
      required
      placeholder="you@example.com"
    >

    <label>Message</label>
    <textarea
      id="message"
      required
      placeholder="Type your message..."
    ></textarea>

    <button type="submit">Send Message</button>

  </form>

  <div class="note" id="note"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("K8yDAqaa4-_BIbHoF");

function sendMessage(e) {
  e.preventDefault();

  const note = document.getElementById("note");
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  note.textContent = "Sending message...";

  emailjs.send("service_4ri1vq6", "template_c1qx3pn", {
    name: name,
    email: email,
    message: message,
    title: "VAULT Contact Form"
  })
  .then(() => {
    note.textContent = "✅ Message sent successfully! I will look when ever I have the chance/ASAP!";
    document.getElementById("contactForm").reset();
  })
  .catch((err) => {
  note.textContent = "❌ Failed to send message.";
  console.error(err);
});
}
</script>

</body>
</html>
