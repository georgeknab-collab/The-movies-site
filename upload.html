<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAULT — Movie Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e8271e;
  --red-dim: rgba(232,39,30,0.12);
  --red-glow: rgba(232,39,30,0.35);
  --bg: #080808;
  --surface: #111111;
  --surface2: #181818;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.13);
  --text: #f0ede8;
  --muted: #666;
  --muted2: #444;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.35;
}

/* ─── BACK BUTTON (UPDATED) ───────────────────────────── */
.back-btn {
  position: fixed;
  top: 88px;
  left: 24px;
  z-index: 100;

  padding: 10px 16px;
  border-radius: 999px;

  background: rgba(17, 17, 17, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);

  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  letter-spacing: 0.5px;
  text-decoration: none;

  transition: all 0.25s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.back-btn:hover {
  transform: translateX(-4px);
  border-color: var(--red);
  background: rgba(232, 39, 30, 0.12);
  box-shadow: 0 0 25px var(--red-glow);
  color: var(--red);
}

/* ─── HEADER ─────────────────────────────── */
header {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 68px;
  background: rgba(8,8,8,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Archivo Black', sans-serif;
  font-size: 22px;
  letter-spacing: 6px;
  color: var(--text);
  text-transform: uppercase;
}
.logo span { color: var(--red); }

.header-count {
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

/* ─── HERO UPLOAD ────────────────────────── */
.upload-zone {
  margin: 50px 40px 20px;
  border: 1px dashed var(--muted2);
  border-radius: 20px;
  padding: 48px 40px;
  text-align: center;
  background: var(--surface);
  transition: border-color 0.3s, background 0.3s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.upload-zone::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, var(--red-dim), transparent 70%);
  opacity: 0;
  transition: opacity 0.4s;
}

.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--red);
  background: #141414;
}
.upload-zone:hover::before, .upload-zone.drag-over::before { opacity: 1; }

.upload-icon {
  font-size: 42px;
  margin-bottom: 16px;
  display: block;
  line-height: 1;
}

.upload-zone h2 {
  font-family: 'Archivo Black', sans-serif;
  font-size: 20px;
  letter-spacing: 1px;
  margin-bottom: 8px;
  color: var(--text);
}

.upload-zone p {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

#fileInput { display: none; }

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 32px;
  background: var(--red);
  color: white;
  border: none;
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  box-shadow: 0 4px 24px var(--red-glow);
}
.btn-primary:hover {
  transform: translateY(-2px);
  background: #f03028;
  box-shadow: 0 8px 32px var(--red-glow);
}
.btn-primary:active { transform: scale(0.97); }

/* ─── TOOLBAR ────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.toolbar-left {
  font-family: 'Archivo Black', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-ghost:hover {
  border-color: var(--red);
  color: var(--red);
  background: var(--red-dim);
}

/* ─── GRID ───────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  padding: 0 40px 60px;
}

/* ─── CARD ───────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
  animation: fadeUp 0.4s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-5px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 0 1px var(--border-hover);
}

/* thumbnail */
.thumb {
  height: 170px;
  background: #0e0e0e;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.thumb-canvas {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

.thumb-canvas.loaded { display: block; }

.thumb-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--muted2);
}
.thumb-placeholder span { font-size: 36px; line-height: 1; }
.thumb-placeholder p { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

/* play overlay */
.play-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.25s;
}
.card:hover .play-overlay { opacity: 1; }

.play-btn-circle {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 28px var(--red-glow);
  transform: scale(0.85);
  transition: transform 0.2s;
}
.card:hover .play-btn-circle { transform: scale(1); }

.play-triangle {
  width: 0;
  height: 0;
  border-style: solid;
  border-width: 10px 0 10px 18px;
  border-color: transparent transparent transparent white;
  margin-left: 4px;
}

/* card body */
.card-body {
  padding: 16px 18px 18px;
}

.card-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 15px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}

.card-meta {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.card-actions {
  display: flex;
  gap: 8px;
}

.btn-card-play {
  flex: 1;
  padding: 9px 0;
  background: var(--red);
  border: none;
  border-radius: 8px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.btn-card-play:hover { background: #f03028; transform: scale(1.02); }

.btn-card-del {
  padding: 9px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-card-del:hover {
  border-color: #e8271e88;
  color: var(--red);
  background: var(--red-dim);
}

/* ─── EMPTY STATE ────────────────────────── */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  color: var(--muted2);
}
.empty-icon { font-size: 56px; margin-bottom: 20px; display: block; line-height: 1; }
.empty h3 {
  font-family: 'Archivo Black', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.empty p { font-size: 13px; letter-spacing: 0.5px; }

/* ─── MODAL ──────────────────────────────── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.94);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 200;
  padding: 30px;
  backdrop-filter: blur(12px);
  animation: none;
}
.modal-backdrop.open {
  display: flex;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal-inner {
  width: 100%;
  max-width: 960px;
  position: relative;
}

.modal-title-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.modal-film-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 18px;
  letter-spacing: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 80%;
}

.btn-close {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-close:hover { background: var(--red); border-color: var(--red); color: white; }

.modal-video {
  width: 100%;
  border-radius: 14px;
  display: block;
  background: #000;
  box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 0 1px var(--border);
  max-height: 70vh;
}

/* ─── SCROLLBAR ──────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<a href="movies.html" class="back-btn">← Back</a>

<header>
  <div class="logo">V<span>A</span>ULT</div>
  <div class="header-count" id="header-count">0 FILMS</div>
</header>

<div class="upload-zone" id="uploadZone">
  <span class="upload-icon">⬆</span>
  <h2>Drop your film here</h2>
  <p>MP4, MOV, AVI, MKV — any video format</p>
  <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
    Choose File
  </button>
  <input type="file" id="fileInput" accept="video/*">
</div>

<div class="toolbar">
  <div class="toolbar-left" id="toolbar-label">Library</div>
  <button class="btn-ghost" onclick="clearAll()">✕ &nbsp;Clear all</button>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal">
  <div class="modal-inner">
    <div class="modal-title-bar">
      <div class="modal-film-title" id="modal-title">—</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <video class="modal-video" id="player" controls></video>
  </div>
</div>

<script>
let movies = JSON.parse(localStorage.getItem("vault_movies") || "[]");

/* ── upload ── */
const fileInput = document.getElementById("fileInput");
const uploadZone = document.getElementById("uploadZone");

fileInput.addEventListener("change", e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

uploadZone.addEventListener("dragover", e => {
  e.preventDefault();
  uploadZone.classList.add("drag-over");
});
uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));
uploadZone.addEventListener("drop", e => {
  e.preventDefault();
  uploadZone.classList.remove("drag-over");
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith("video/")) processFile(f);
});

function processFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    movies.push({ id: Date.now(), name: cleanName(file.name), data: ev.target.result });
    save(); render();
  };
  reader.readAsDataURL(file);
}

function cleanName(n) {
  return n.replace(/\.[^.]+$/, "").replace(/[_\-\.]+/g, " ").trim();
}

/* ── persistence ── */
function save() { localStorage.setItem("vault_movies", JSON.stringify(movies)); }

/* ── render ── */
function render() {
  const grid = document.getElementById("grid");
  const count = document.getElementById("header-count");
  const label = document.getElementById("toolbar-label");
  count.textContent = movies.length + (movies.length === 1 ? " FILM" : " FILMS");
  label.textContent = movies.length > 0 ? `Library — ${movies.length} title${movies.length > 1 ? "s" : ""}` : "Library";

  if (movies.length === 0) {
    grid.innerHTML = `<div class="empty">
      <span class="empty-icon">🎞</span>
      <h3>Vault is empty</h3>
      <p>Upload a film to get started</p>
    </div>`;
    return;
  }

  grid.innerHTML = movies.map((m, i) => `
    <div class="card" style="animation-delay:${i * 0.05}s" onclick="playMovie(${m.id})">
      <div class="thumb">
        <canvas class="thumb-canvas" id="canvas-${m.id}" width="280" height="170"></canvas>
        <div class="thumb-placeholder" id="placeholder-${m.id}">
          <span>🎬</span>
          <p>Loading preview</p>
        </div>
        <div class="play-overlay">
          <div class="play-btn-circle"><div class="play-triangle"></div></div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${m.name}</div>
        <div class="card-meta">VIDEO FILE</div>
        <div class="card-actions">
          <button class="btn-card-play" onclick="event.stopPropagation(); playMovie(${m.id})">▶ Play</button>
          <button class="btn-card-del" onclick="event.stopPropagation(); deleteMovie(${m.id})" title="Delete">🗑</button>
        </div>
      </div>
    </div>
  `).join("");

  movies.forEach(m => generateThumb(m));
}

/* ── thumbnail via hidden video ── */
function generateThumb(m) {
  const vid = document.createElement("video");
  vid.src = m.data;
  vid.muted = true;
  vid.currentTime = 2;
  vid.addEventListener("seeked", () => {
    const canvas = document.getElementById("canvas-" + m.id);
    const placeholder = document.getElementById("placeholder-" + m.id);
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(vid, 0, 0, 280, 170);
    canvas.classList.add("loaded");
    if (placeholder) placeholder.style.display = "none";
    vid.src = "";
  }, { once: true });
  vid.load();
}

/* ── playback ── */
function playMovie(id) {
  const m = movies.find(x => x.id === id);
  if (!m) return;
  const modal = document.getElementById("modal");
  const player = document.getElementById("player");
  const title = document.getElementById("modal-title");
  title.textContent = m.name;
  player.src = m.data;
  modal.classList.add("open");
  player.play();
}

function closeModal() {
  const modal = document.getElementById("modal");
  const player = document.getElementById("player");
  player.pause();
  player.src = "";
  modal.classList.remove("open");
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

function deleteMovie(id) {
  movies = movies.filter(m => m.id !== id);
  save(); render();
}

function clearAll() {
  if (movies.length === 0) return;
  if (confirm(`Remove all ${movies.length} film${movies.length > 1 ? "s" : ""} from Vault?`)) {
    localStorage.removeItem("vault_movies");
    movies = [];
    render();
  }
}

render();
</script>
</body>
</html>
