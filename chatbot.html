<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VAULT — AI Chat</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --red:#e8271e;
  --bg:#070707;
  --surface:#101010;
  --surface2:#151515;
  --border:rgba(255,255,255,0.08);
  --text:#f2efe9;
  --muted:#7b7b7b;
  --glow:rgba(232,39,30,0.25);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
header{
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
  background:rgba(10,10,10,0.9);
}

.logo{
  font-family:'Archivo Black',sans-serif;
  letter-spacing:5px;
}

.logo span{ color:var(--red); }

.top-links a{
  color:var(--muted);
  text-decoration:none;
  margin-left:15px;
}

.top-links a:hover{
  color:var(--red);
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* CHAT */
.chat-section{
  flex:1;
  display:flex;
  flex-direction:column;
  height:100%;
}

/* HERO */
.hero{
  padding:25px;
  border-bottom:1px solid var(--border);
}

.hero h1{
  font-size:32px;
  font-family:'Archivo Black';
}

.hero p{
  color:var(--muted);
}

/* CHAT BOX */
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  scroll-behavior:smooth;
}

.message{
  max-width:75%;
  padding:12px 15px;
  border-radius:15px;
  font-size:14px;
  white-space:pre-wrap;
}

.user{
  align-self:flex-end;
  background:var(--red);
  color:white;
}

.ai{
  align-self:flex-start;
  background:var(--surface);
  border:1px solid var(--border);
}

/* INPUT */
.input-area{
  display:flex;
  padding:15px;
  border-top:1px solid var(--border);
  background:#0b0b0b;
}

input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--surface);
  color:white;
  outline:none;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:20px;
  background:var(--red);
  color:white;
  cursor:pointer;
}

button:disabled{
  opacity:0.5;
}

/* SCROLL FIX */
.chat-box::-webkit-scrollbar{
  width:8px;
}

.chat-box::-webkit-scrollbar-thumb{
  background:#222;
}
</style>
</head>

<body>

<header>
  <div class="logo">V<span>A</span>ULT</div>

  <div class="top-links">
    <a href="index.html">Home</a>
    <a href="upload.html">Your movies</a>
  </div>
</header>

<div class="main">

  <section class="chat-section">

    <div class="hero">
      <h1>AI Assistant</h1>
      <p>Ask anything about movies and the VAULT universe.</p>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
      <input id="userInput" placeholder="Ask VAULT AI...">
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

  </section>

</div>

<script>

const API_KEY = "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";
const API_URL = "https://api.groq.com/openai/v1/chat/completions";

let userName = localStorage.getItem("vaultUserName") || "";
let nameCollected = !!userName;

const messages = [{
  role:"system",
  content:`
You are VAULT AI.

NAME RULE:
If user says:
"my name is X", "call me X", "change my name to X"
respond EXACTLY:
"Got it! I'll call you X from now on. [NEWNAME:X]"

Always put tag at end.
`
}];

function addMessage(text, type){
  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML += `<div class="message ${type}">${text}</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;
}

function checkForNameChange(reply){
  const match = reply.match(/\[NEWNAME:(.+?)\]/);

  if(match){
    const newName = match[1].trim();
    userName = newName;
    localStorage.setItem("vaultUserName", newName);
    nameCollected = true;

    return reply.replace(/\[NEWNAME:.+?\]/,"").trim();
  }

  return reply;
}

window.addEventListener("load", () => {
  if(userName){
    addMessage(`Welcome back, ${userName}! 🎬`, "ai");
  } else {
    addMessage("Hey! What's your name?", "ai");
  }
});

async function sendMessage(){

  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text) return;

  // detect name intent locally
  const lower = text.toLowerCase();
  if(lower.includes("my name is") || lower.includes("call me") || lower.includes("change my name")){
    nameCollected = true;
  }

  addMessage(text, "user");

  messages.push({role:"user", content:text});

  input.value = "";

  document.getElementById("sendBtn").disabled = true;

  const thinking = document.createElement("div");
  thinking.className = "message ai";
  thinking.textContent = "Thinking...";
  document.getElementById("chatBox").appendChild(thinking);

  try{

    const res = await fetch(API_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + API_KEY
      },
      body:JSON.stringify({
        model:"llama-3.3-70b-versatile",
        messages:messages,
        temperature:0.9,
        max_tokens:700
      })
    });

    const data = await res.json();

    thinking.remove();

    let reply = data.choices[0].message.content;

    reply = checkForNameChange(reply);

    messages.push({role:"assistant", content:reply});

    addMessage(reply, "ai");

  }catch(err){
    thinking.remove();
    addMessage("Error: " + err.message, "ai");
  }

  document.getElementById("sendBtn").disabled = false;
}

document.getElementById("userInput").addEventListener("keydown",(e)=>{
  if(e.key === "Enter") sendMessage();
});

</script>

</body>
</html>
